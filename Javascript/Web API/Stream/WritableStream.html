<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WritableStream</title>
    <meta name="theme-color" content="light">
</head>

<body>
    <p>Di Browser, WritableStream di pake di FileSystem API</p>
    <p>FileSystem API tidak didukung di Fire Fox, jadi di FF WritableStream nggak kepake dimanamun di API bawaan browser FireFox (Februari - 2026)</p>

    <div id="text-output"></div>

    <script type="module">
        const writableStream = new WritableStream(
            // mengimplimentasi sink: see WrtableStream constructor docs about sink
            {
                write(chunk, controller) {
                    console.log(controller.constructor.name);
                    const textElement = document.getElementById("text-output");
                    textElement.textContent += chunk;
                },
            },
        );

        const writer = writableStream.getWriter();

        try {
            writer.write("Hello, ");
            writer.write("world!\n");
            writer.write("This has been a demo!\n");

            await writer.close(); // wait for all chunks to be written
            console.log("All chunks written");
        } catch (error) {
            console.error("Stream error: ", error);
        } finally {
            writer.releaseLock();
        }
    </script>
</body>

</html>
